<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>❄️ Frost Expense Tracker</title>
  <style>
    :root {
      --bg: #0f1217;
      --card: #1a1f2b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --frost: #67e8f9;
      --frost-dark: #22d3ee;
      --danger: #f87171;
      --border: rgba(103, 232, 249, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, #0f1217 0%, #131720 100%);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      background: linear-gradient(90deg, #67e8f9, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(103, 232, 249, 0.3);
    }

    .input-section {
      background: var(--card);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 140px;
      gap: 1rem;
    }

    input, select, button {
      padding: 0.9rem 1.2rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(30, 41, 59, 0.6);
      color: var(--text);
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--frost);
      box-shadow: 0 0 0 3px rgba(103, 232, 249, 0.2);
    }

    button {
      background: linear-gradient(135deg, var(--frost), var(--frost-dark));
      color: #0f172a;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(103, 232, 249, 0.4);
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .total {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .total span {
      color: var(--frost);
    }

    .expenses-list {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1.1rem 1.4rem;
      text-align: left;
      border-bottom: 1px solid rgba(103, 232, 249, 0.08);
    }

    th {
      background: rgba(103, 232, 249, 0.08);
      color: var(--frost);
      font-weight: 600;
    }

    .delete-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: #ef4444;
      transform: scale(1.05);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-size: 1.2rem;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>❄️ Expense Tracker</h1>

  <div class="input-section">
    <div class="form-grid">
      <input type="text" id="description" placeholder="Description (e.g. Coffee)" />
      <input type="number" id="amount" placeholder="Amount" step="0.01" min="0" />
      <select id="category">
        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Bills">Bills</option>
        <option value="Shopping">Shopping</option>
        <option value="Other">Other</option>
      </select>
      <button id="addBtn">Add Expense</button>
    </div>
  </div>

  <div class="controls">
    <div>
      <label for="filter">Filter by category: </label>
      <select id="filter">
        <option value="">All Categories</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Bills">Bills</option>
        <option value="Shopping">Shopping</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="total">Total: <span id="totalAmount">$0.00</span></div>
  </div>

  <div class="expenses-list">
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Amount</th>
          <th>Category</th>
          <th style="width:120px;">Action</th>
        </tr>
      </thead>
      <tbody id="expenseList"></tbody>
    </table>
  </div>

  <div id="empty" class="empty-state" style="display:none;">
    No expenses recorded yet ❄️
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
